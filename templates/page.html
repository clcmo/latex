<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$title$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <script>
    MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #2a2a2e;
      --text: #e8e4dc;
      --muted: #888;
      --gold: #c8a96e;
      --link: #7eb8c8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.15rem;
      line-height: 1.75;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: .6rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .topbar a.back {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .06em;
      transition: color .15s;
    }
    .topbar a.back:hover { color: var(--text); }
    .topbar .sep { color: var(--border); }
    .topbar .doc-title {
      font-size: .9rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar .spacer { flex: 1; }
    .btn-dl {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      padding: .3rem .8rem;
      background: rgba(200,169,110,.12);
      color: var(--gold);
      border: 1px solid rgba(200,169,110,.3);
      border-radius: 3px;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-dl:hover { background: rgba(200,169,110,.22); }

    /* ── Layout ── */
    .page-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      gap: 4rem;
    }
    @media (max-width: 720px) {
      .page-wrap { grid-template-columns: 1fr; }
      .toc-panel { display: none; }
    }

    /* ── TOC ── */
    .toc-panel {
      position: sticky;
      top: 60px;
      align-self: start;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .toc-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
    }
    #toc { list-style: none; }
    #toc li { margin-bottom: .3rem; }
    #toc a {
      font-size: .88rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
      display: block;
      padding: .15rem 0;
      border-left: 2px solid transparent;
      padding-left: .6rem;
    }
    #toc a:hover, #toc a.active {
      color: var(--gold);
      border-left-color: var(--gold);
    }
    #toc li.toc-h3 a { padding-left: 1.4rem; font-size: .82rem; }

    /* ── Article ── */
    article { min-width: 0; }
    .doc-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .doc-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 600;
      line-height: 1.2;
      color: var(--gold);
      margin-bottom: .75rem;
    }
    .doc-meta {
      font-size: .88rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    /* ── Content typography ── */
    article h1,article h2,article h3,article h4 {
      font-weight: 600;
      line-height: 1.25;
      scroll-margin-top: 70px;
    }
    article h1 { font-size: 1.9rem; margin: 2.5rem 0 1rem; }
    article h2 { font-size: 1.5rem; margin: 2rem 0 .75rem; color: var(--gold); }
    article h3 { font-size: 1.2rem; margin: 1.5rem 0 .5rem; }
    article p  { margin-bottom: 1.25rem; }
    article a  { color: var(--link); }
    article ul, article ol { margin: 0 0 1.25rem 1.5rem; }
    article li { margin-bottom: .4rem; }
    article blockquote {
      border-left: 3px solid var(--gold);
      margin: 1.5rem 0;
      padding: .75rem 1.25rem;
      background: rgba(200,169,110,.06);
      font-style: italic;
    }
    article code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .88em;
      background: rgba(255,255,255,.07);
      padding: .15em .4em;
      border-radius: 3px;
    }
    article pre {
      background: #1a1a1d;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    article pre code { background: none; padding: 0; font-size: .85rem; }
    article table {
      width: 100%; border-collapse: collapse;
      margin-bottom: 1.5rem; font-size: .95rem;
    }
    article th { background: rgba(200,169,110,.1); color: var(--gold); text-align: left; }
    article th,article td {
      padding: .6rem .9rem;
      border: 1px solid var(--border);
    }
    article img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
    article hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

    /* ── Math display ── */
    .MathJax { overflow-x: auto; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back" href="../../index.html">← Início</a>
  <span class="sep">|</span>
  <span class="doc-title">$title$</span>
  <span class="spacer"></span>
$if(basename)$
  <a class="btn-dl" href="../../pdf/$basename$.pdf" download>↓ Baixar PDF</a>
$endif$
</div>

<div class="page-wrap">
  <aside class="toc-panel">
    <p class="toc-label">Conteúdo</p>
    <ul id="toc"></ul>
  </aside>

  <article>
    <header class="doc-header">
      <h1>$title$</h1>
      <div class="doc-meta">
$if(author)$<span>✦ $author$</span>$endif$
$if(date)$<span>$date$</span>$endif$
$if(category)$<span style="text-transform:capitalize">$category$</span>$endif$
      </div>
    </header>

    $body$
  </article>
</div>

<script>
  // Auto-generate TOC from headings
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('article h2, article h3');
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'heading-' + i;
    const li = document.createElement('li');
    li.className = h.tagName === 'H3' ? 'toc-h3' : '';
    li.innerHTML = `<a href="#${h.id}">${h.textContent}</a>`;
    toc.appendChild(li);
  });

  // Active TOC highlighting on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const id = e.target.id;
      const link = toc.querySelector(`a[href="#${id}"]`);
      if (link) link.classList.toggle('active', e.isIntersecting);
    });
  }, { rootMargin: '-60px 0px -80% 0px' });
  headings.forEach(h => observer.observe(h));
</script>
</body>
</html>
